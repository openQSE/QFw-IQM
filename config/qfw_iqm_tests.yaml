default-level: l1

levels:
  - name: smoke
    description: Environment check, discovery, and one smoke submission.
  - name: l1
    description: Smoke plus short timing-overhead and 1Q timing sweeps.
  - name: l2
    description: Smoke plus broader timing-overhead and 1Q timing sweeps.

tests:
  - name: env_check
    level: smoke
    script: scripts/iqm_env_check.py

  - name: discover
    level: smoke
    script: scripts/iqm_discover.py

  - name: submit_smoke
    level: smoke
    script: scripts/iqm_submit_smoke.py

  - name: timing_overhead
    level: l1
    script: scripts/iqm_timing_overhead.py
    args:
      l1:
        - --shots-sweep
        - env: QFW_IQM_RUN_ALL_OVERHEAD_SHOTS_SWEEP
          default: 1,10,100
        - --batch-sweep
        - env: QFW_IQM_RUN_ALL_OVERHEAD_BATCH_SWEEP
          default: 1,2
        - --batch-shots
        - env: QFW_IQM_RUN_ALL_OVERHEAD_BATCH_SHOTS
          default: "100"
        - --widths
        - env: QFW_IQM_RUN_ALL_OVERHEAD_WIDTHS
          default: "1"
        - --repetitions
        - env: QFW_IQM_RUN_ALL_OVERHEAD_REPETITIONS
          default: "1"
      l2:
        - --shots-sweep
        - env: QFW_IQM_RUN_ALL_OVERHEAD_SHOTS_SWEEP
          default: 1,10,100,1000
        - --batch-sweep
        - env: QFW_IQM_RUN_ALL_OVERHEAD_BATCH_SWEEP
          default: 1,2,4
        - --batch-shots
        - env: QFW_IQM_RUN_ALL_OVERHEAD_BATCH_SHOTS
          default: "100"
        - --widths
        - env: QFW_IQM_RUN_ALL_OVERHEAD_WIDTHS
          default: 1,2,4
        - --repetitions
        - env: QFW_IQM_RUN_ALL_OVERHEAD_REPETITIONS
          default: "1"

  - name: timing_1q
    level: l1
    script: scripts/iqm_timing_1q.py
    args:
      l1:
        - --qubits
        - env: QFW_IQM_RUN_ALL_1Q_QUBITS
          default: QB1
        - --gates
        - env: QFW_IQM_RUN_ALL_1Q_GATES
          default: rx
        - --depths
        - env: QFW_IQM_RUN_ALL_1Q_DEPTHS
          default: 1,2
        - --shots
        - env: QFW_IQM_RUN_ALL_1Q_SHOTS
          default: "100"
        - --repetitions
        - env: QFW_IQM_RUN_ALL_1Q_REPETITIONS
          default: "1"
      l2:
        - --qubits
        - env: QFW_IQM_RUN_ALL_1Q_QUBITS
          default: all
        - --gates
        - env: QFW_IQM_RUN_ALL_1Q_GATES
          default: x,rx,ry
        - --depths
        - env: QFW_IQM_RUN_ALL_1Q_DEPTHS
          default: 1,2,4,8,16,32,64,128
        - --shots
        - env: QFW_IQM_RUN_ALL_1Q_SHOTS
          default: "100"
        - --repetitions
        - env: QFW_IQM_RUN_ALL_1Q_REPETITIONS
          default: "1"
